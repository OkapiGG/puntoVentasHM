spring.application.name=puntoVentaHM.pos_hamburguesas

# Conexión a base de datos (sobreescribir en producción con variables de entorno)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/punto_ventas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:maiz564}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway: usar baseline para esquemas existentes (no destruye nada)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# Reglas de negocio
app.caja.umbral-retiro-seguridad=${CAJA_UMBRAL_RETIRO_SEGURIDAD:3000}

# Seguridad: duración de tokens de sesión en horas (default 12)
app.seguridad.token-duracion-horas=${TOKEN_DURACION_HORAS:12}
